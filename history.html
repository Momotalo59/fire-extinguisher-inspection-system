<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📜 ประวัติการตรวจ - ระบบตรวจเช็คถังดับเพลิง</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
  <link href="css/responsive.css" rel="stylesheet">
  <link href="css/animations.css" rel="stylesheet">
</head>
<body>
  <!-- Navigation Bar -->
  <nav class="navbar navbar-expand-lg navbar-light">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">
        <i class="fas fa-fire-extinguisher me-2"></i>ระบบตรวจเช็คถังดับเพลิง
      </a>
      <div class="ms-auto">
        <a href="dashboard.html" class="btn btn-sm btn-outline-primary me-2">
          <i class="fas fa-arrow-left me-1"></i>กลับหน้าแรก
        </a>
        <button class="btn btn-sm btn-outline-danger" onclick="logout()">
          <i class="fas fa-sign-out-alt me-1"></i>ออกจากระบบ
        </button>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="container-fluid">
    <div class="row mt-4">
      <div class="col-12">
        <h2 class="mb-4"><i class="fas fa-history me-2"></i>ประวัติการตรวจเช็ค</h2>

        <!-- Filter -->
        <div class="card mb-4">
          <div class="card-header">🔍 ค้นหา</div>
          <div class="card-body">
            <div class="row">
              <div class="col-md-4 mb-3">
                <label class="form-label">รหัสถัง</label>
                <input type="text" class="form-control" id="filter-extinguisher-id" placeholder="ค้นหารหัสถัง">
              </div>
              <div class="col-md-4 mb-3">
                <label class="form-label">ตั้งแต่วันที่</label>
                <input type="date" class="form-control" id="filter-from-date">
              </div>
              <div class="col-md-4 mb-3">
                <label class="form-label">ถึงวันที่</label>
                <input type="date" class="form-control" id="filter-to-date">
              </div>
            </div>
            <button class="btn btn-primary" onclick="loadInspectionHistory()">
              <i class="fas fa-search me-2"></i>ค้นหา
            </button>
            <button class="btn btn-secondary" onclick="resetFilters()">
              <i class="fas fa-redo me-2"></i>รีเซ็ต
            </button>
          </div>
        </div>

        <!-- Inspection History Table -->
        <div class="card">
          <div class="card-header">📋 ประวัติการตรวจเช็ค</div>
          <div class="card-body">
            <div class="table-responsive">
              <table class="table table-hover">
                <thead>
                  <tr>
                    <th>รหัสถัง</th>
                    <th>วันที่ตรวจ</th>
                    <th>ประเภท</th>
                    <th>ผู้ตรวจ</th>
                    <th>ผลการตรวจ</th>
                    <th>รายละเอียด</th>
                  </tr>
                </thead>
                <tbody id="history-tbody">
                  <tr>
                    <td colspan="6" class="text-center text-muted">
                      <i class="fas fa-spinner spin me-2"></i>กำลังโหลดข้อมูล...
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Detail Modal -->
  <div class="modal fade" id="detailModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">รายละเอียดการตรวจเช็ค</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="detail-content">
          <!-- Content will be loaded here -->
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">ปิด</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage.js"></script>

  <script src="js/firebase-config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>

  <script>
    // โหลดประวัติการตรวจ
    async function loadInspectionHistory() {
      showLoading();
      try {
        let query = firebase.firestore().collection('inspections');
        
        const extId = document.getElementById('filter-extinguisher-id').value;
        if (extId) {
          query = query.where('extinguisherId', '==', extId);
        }

        query = query.orderBy('inspectionDate', 'desc').limit(100);
        const snapshot = await query.get();

        const tbody = document.getElementById('history-tbody');
        tbody.innerHTML = '';

        if (snapshot.empty) {
          tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted">ไม่มีข้อมูล</td></tr>';
          hideLoading();
          return;
        }

        snapshot.forEach(doc => {
          const inspection = doc.data();
          const row = tbody.insertRow();
          row.innerHTML = `
            <td>${inspection.extinguisherId}</td>
            <td>${formatThaiDate(inspection.inspectionDate)}</td>
            <td>${inspection.inspectionType}</td>
            <td>${inspection.inspector.name}</td>
            <td><span class="badge ${inspection.result === 'ผ่าน' ? 'badge-passed' : 'badge-failed'}">${inspection.result}</span></td>
            <td><button class="btn btn-sm btn-info" onclick="showDetails('${doc.id}')"><i class="fas fa-eye"></i></button></td>
          `;
        });
        hideLoading();
      } catch (error) {
        hideLoading();
        console.error('Load history error:', error);
        showError('ข้อผิดพลาด', error.message);
      }
    }

    // แสดงรายละเอียด
    async function showDetails(inspectionId) {
      try {
        const doc = await firebase.firestore().collection('inspections').doc(inspectionId).get();
        const inspection = doc.data();
        
        const content = `
          <div class="row mb-3">
            <div class="col-md-6"><strong>รหัสถัง:</strong> ${inspection.extinguisherId}</div>
            <div class="col-md-6"><strong>วันที่:</strong> ${formatThaiDate(inspection.inspectionDate)}</div>
          </div>
          <div class="row mb-3">
            <div class="col-md-6"><strong>ผู้ตรวจ:</strong> ${inspection.inspector.name}</div>
            <div class="col-md-6"><strong>ผล:</strong> <span class="badge ${inspection.result === 'ผ่าน' ? 'badge-success' : 'badge-danger'}">${inspection.result}</span></div>
          </div>
          <div class="row mb-3">
            <div class="col-12"><strong>หมายเหตุ:</strong><br>${inspection.notes || '-'}</div>
          </div>
        `;
        
        document.getElementById('detail-content').innerHTML = content;
        new bootstrap.Modal(document.getElementById('detailModal')).show();
      } catch (error) {
        showError('ข้อผิดพลาด', error.message);
      }
    }

    // รีเซ็ตตัวกรอง
    function resetFilters() {
      document.getElementById('filter-extinguisher-id').value = '';
      document.getElementById('filter-from-date').value = '';
      document.getElementById('filter-to-date').value = '';
      loadInspectionHistory();
    }

    // โหลดเมื่อเปิดหน้า
    window.addEventListener('load', () => {
      checkAuth().then(user => {
        if (!user) {
          window.location.href = 'index.html';
          return;
        }
        loadInspectionHistory();
      });
    });
  </script>
</body>
</html>
